# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
ignore = [
    # proc-macro-error v1.x is unmaintained. It is transitively pulled in via
    # age -> i18n-embed-fl -> fluent-bundle. Drop this ignore once those crates
    # migrate to proc-macro-error2 (or another maintained alternative).
    # https://rustsec.org/advisories/RUSTSEC-2024-0370
    "RUSTSEC-2024-0370",
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
